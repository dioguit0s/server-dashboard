spring.application.name=server-dashboard
server.forward-headers-strategy=framework
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**
# Importar o arquivo .env (optional: evita erro se o arquivo nao existir, ex: em producao)
spring.config.import=optional:file:.env[.properties]
# Credenciais (carregadas do .env ou variaveis de ambiente)
dashboard.admin.username=${DASHBOARD_ADMIN_USERNAME:admin}
dashboard.admin.password=${DASHBOARD_ADMIN_PASSWORD}
# Configuracoes do Banco de Dados H2
spring.datasource.url=jdbc:h2:file:./data/metrics-database;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false
