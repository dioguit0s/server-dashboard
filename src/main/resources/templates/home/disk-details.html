<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detalhes do Armazenamento</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{home/styles/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-blur fixed-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <i class="bi bi-hdd-rack-fill text-primary"></i>
            <span>Server<span class="text-white-50 fw-light">Dash</span></span>
        </a>

        <div class="navbar-nav ms-auto d-flex flex-row gap-4 align-items-center">
            <a class="nav-link active" href="/"><i class="bi bi-arrow-left me-1"></i>Voltar para a home</a>
            <span sec:authorize="!isAuthenticated()"><a class="nav-link" th:href="@{/login}">Login</a></span>
            <span sec:authorize="isAuthenticated()">
                <form th:action="@{/logout}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-link nav-link p-0 border-0 bg-transparent text-white-50">Logout</button>
                </form>
            </span>
        </div>
    </div>
</nav>

<div style="height: 100px;"></div>

<div class="container pb-5">
    <h4 class="text-white fw-bold mb-4">Detalhes do Armazenamento</h4>

    <div class="row g-4 mb-4">
    </div>

    <div class="row g-4 mb-5">
        <div class="col-12 col-lg-6">
            <h5 class="text-white mb-3"><i class="bi bi-device-hdd me-2"></i>Discos Físicos (Hardware)</h5>
            <div class="card card-metric h-100">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-dark table-hover table-borderless mb-0">
                            <thead class="border-bottom border-secondary border-opacity-25">
                            <tr>
                                <th class="ps-4 py-3 text-white-50 small text-uppercase">Modelo</th>
                                <th class="py-3 text-white-50 small text-uppercase">Serial</th>
                                <th class="pe-4 py-3 text-white-50 small text-uppercase text-end">Tamanho</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="disk : ${hardwareDisksList}" class="align-middle">
                                <td class="ps-4 py-3 fw-bold text-white" th:text="${disk.diskModel}"></td>
                                <td class="py-3 text-end small text-white-50 font-monospace" th:text="${disk.serialNumber}"></td>
                                <td class="pe-4 py-3 text-end font-monospace text-success" th:text="${disk.diskSize}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-12 col-lg-6">
            <h5 class="text-white mb-3"><i class="bi bi-folder2-open me-2"></i>Partições e Volumes</h5>
            <div class="card card-metric h-100">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-dark table-hover table-borderless mb-0">
                            <thead class="border-bottom border-secondary border-opacity-25">
                            <tr>
                                <th class="ps-4 py-3 text-white-50 small text-uppercase">Mount</th>
                                <th class="py-3 text-white-50 small text-uppercase">Tipo</th>
                                <th class="pe-4 py-3 text-white-50 small text-uppercase text-end">Livre / Total</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="volume : ${logicalVolumesList}" class="align-middle">
                                <td class="ps-4 py-3 fw-bold">
                                    <span th:text="${volume.mountPoint}"></span>
                                </td>
                                <td class="py-3"><span class="badge bg-primary bg-opacity-25 text-primary border border-primary border-opacity-25" th:text="${volume.fileSystemType}"></span></td>
                                <td class="pe-4 py-3 text-end font-monospace small">
                                    <span class="text-white" th:text="${volume.usableSpace}"></span> /
                                    <span class="text-white-50" th:text="${volume.totalSpace}"></span>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="card card-metric">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="d-flex align-items-center gap-2">
                    <div class="icon-box text-success bg-success bg-opacity-10" style="width: 24px; height: 24px;">
                        <i class="bi bi-device-hdd" style="font-size: 0.8rem;"></i>
                    </div>
                    <span class="card-title-label m-0">Usado vs Livre (Geral)</span>
                </div>
            </div>
            <div id="diskChartContainer" style="height: 300px; width: 100%;" th:data-disk-int="${diskInt}">
                <canvas id="diskPieChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:src="@{/home/js/websocket-utils.js}"></script>
<script th:src="@{home/js/disk-details.js}"></script>

</body>
</html>
