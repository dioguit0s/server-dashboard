<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <title>Containers Docker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/home/styles/style.css}">

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0f0f0f">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-blur fixed-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <i class="bi bi-hdd-rack-fill brand-mark" aria-hidden="true"></i>
            <span>Server<span class="text-white-50 fw-normal">Dash</span></span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbarCollapse"
                aria-controls="mainNavbarCollapse" aria-expanded="false" aria-label="Alternar menu de navegação">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbarCollapse">
            <div class="navbar-nav ms-auto align-items-lg-center">
                <a class="nav-link" href="/">Visão Geral</a>
                <a class="nav-link" href="/charts">Histórico</a>
                <span sec:authorize="isAuthenticated()"><a class="nav-link active" href="/containers">Containers</a></span>
                <span sec:authorize="isAuthenticated()"><a class="nav-link" href="/services">Serviços</a></span>
                <span sec:authorize="isAuthenticated()"><a class="nav-link" href="/processes">Processos</a></span>
                <span sec:authorize="!isAuthenticated()"><a class="nav-link" th:href="@{/login}">Login</a></span>
                <span sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-link nav-link p-0 border-0 bg-transparent">Logout</button>
                    </form>
                </span>
            </div>
        </div>
    </div>
</nav>

<div style="height: 100px;"></div>

<div class="container pb-5">
    <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3 mb-4">
        <h4 class="page-heading m-0">Painel de Containers</h4>
        <div class="d-flex align-items-center gap-2 flex-wrap">
            <span class="badge badge-signal">Status via Docker Engine</span>
            <div class="btn-group" role="group">
                <input type="radio" class="btn-check" name="stateFilter" id="filterAll" value="all" checked>
                <label class="btn btn-outline-secondary btn-sm" for="filterAll">Todos</label>
                <input type="radio" class="btn-check" name="stateFilter" id="filterRunning" value="running">
                <label class="btn btn-outline-secondary btn-sm" for="filterRunning">Running</label>
                <input type="radio" class="btn-check" name="stateFilter" id="filterStopped" value="stopped">
                <label class="btn btn-outline-secondary btn-sm" for="filterStopped">Parados</label>
            </div>
        </div>
    </div>

    <div id="dockerUnavailableBanner" class="alert alert-warning d-none mb-4" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i>
        Docker Engine indisponível ou sem permissão.
    </div>

    <div class="card card-metric">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-dark table-hover table-borderless mb-0">
                    <thead>
                    <tr class="border-bottom border-metric-table">
                        <th class="ps-4 py-3 text-white-50 small fw-semibold text-uppercase">Container</th>
                        <th class="py-3 text-white-50 small fw-semibold text-uppercase">Status</th>
                        <th class="py-3 text-white-50 small fw-semibold text-uppercase text-end">CPU %</th>
                        <th class="py-3 text-white-50 small fw-semibold text-uppercase text-end">RAM %</th>
                        <th class="py-3 text-white-50 small fw-semibold text-uppercase text-end pe-4">Ações</th>
                    </tr>
                    </thead>
                    <tbody id="containersTableBody">
                    <tr>
                        <td colspan="5" class="text-center text-white-50 py-5">Aguardando telemetria do Docker...</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script th:src="@{/home/js/websocket-utils.js}"></script>
<script th:src="@{/home/js/csrf-utils.js}"></script>
<script th:src="@{/home/js/containers.js}"></script>

</body>
</html>
