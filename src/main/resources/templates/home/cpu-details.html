<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Detalhes do Processador</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/home/styles/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-blur fixed-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <i class="bi bi-hdd-rack-fill brand-mark" aria-hidden="true"></i>
            <span>Server<span class="text-white-50 fw-normal">Dash</span></span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbarCollapse"
                aria-controls="mainNavbarCollapse" aria-expanded="false" aria-label="Alternar menu de navegação">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbarCollapse">
            <div class="navbar-nav ms-auto align-items-lg-center">
                <a class="nav-link active" href="/"><i class="bi bi-arrow-left me-1" aria-hidden="true"></i>Voltar para a home</a>
                <span sec:authorize="!isAuthenticated()"><a class="nav-link" th:href="@{/login}">Login</a></span>
                <span sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-link nav-link p-0 border-0 bg-transparent">Logout</button>
                    </form>
                </span>
            </div>
        </div>
    </div>
</nav>

<div style="height: 100px;"></div>

<div class="container pb-5">
    <h4 class="page-heading mb-4">Detalhes do Processador</h4>

    <div class="row g-4 mb-4">
        <div class="col-12 col-lg-8">
            <div class="card card-metric h-100">
                <div class="card-body p-4">
                    <div class="card-title-label mb-2">Modelo e Fabricante</div>
                    <div class="text-white fw-medium fs-5" th:text="${processorName}">--</div>
                    <div class="text-muted small mt-1">
                        <span th:text="${processorVendor}">--</span> |
                        Microarquitetura: <span th:text="${processorMicroarchitecture}">--</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card card-metric h-100">
                <div class="card-body p-4">
                    <div class="card-title-label mb-2">Velocidade Máxima</div>
                    <div class="text-white fw-medium fs-4" th:text="${processorMaximumFrequency}">--</div>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-4">
            <div class="card card-metric h-100 border-accent-cobalt">
                <div class="card-body p-4">
                    <div class="card-title-label mb-2">Núcleos Físicos (Cores)</div>
                    <div class="text-white fw-medium fs-4 font-monospace" th:text="${physicalCores}">--</div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-4">
            <div class="card card-metric h-100 border-accent-signal">
                <div class="card-body p-4">
                    <div class="card-title-label mb-2">Núcleos Lógicos (Threads)</div>
                    <div class="text-white fw-medium fs-4 font-monospace" th:text="${logicalCores}">--</div>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-4">
            <div class="card card-metric h-100 border-accent-cyan">
                <div class="card-body p-4">
                    <div class="card-title-label mb-2">Média de Carga (1 min)</div>
                    <div class="text-white fw-medium fs-4 font-monospace" th:text="${systemLoadAverage}">--</div>
                </div>
            </div>
        </div>
    </div>

    <div class="card card-metric">
        <div class="card-body p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="d-flex align-items-center gap-2">
                    <div class="icon-box icon-box-metric" style="width: 24px; height: 24px;">
                        <i class="bi bi-cpu" style="font-size: 0.8rem;" aria-hidden="true"></i>
                    </div>
                    <span class="card-title-label m-0">Uso da CPU em tempo real</span>
                </div>
                <h4 id="cpuDetailedValue" class="text-white m-0 fw-normal font-monospace">--%</h4>
            </div>
            <div style="height: 300px; width: 100%;">
                <canvas id="cpuDetailedChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:src="@{/home/js/websocket-utils.js}"></script>
<script th:src="@{/home/js/cpu-details.js}"></script>

</body>
</html>
