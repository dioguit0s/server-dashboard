<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <title>Logs do Container</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{home/styles/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-blur fixed-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <i class="bi bi-hdd-rack-fill text-primary"></i>
            <span>Server<span class="text-white-50 fw-light">Dash</span></span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <div class="navbar-nav ms-auto d-flex flex-row gap-4 align-items-center">
                <a class="nav-link" href="/">Visão Geral</a>
                <a class="nav-link" href="/charts">Histórico</a>
                <span sec:authorize="isAuthenticated()"><a class="nav-link" href="/services">Serviços</a></span>
                <span sec:authorize="isAuthenticated()"><a class="nav-link" href="/processes">Processos</a></span>
                <span sec:authorize="isAuthenticated()"><a class="nav-link" href="/containers">Containers</a></span>
                <span sec:authorize="!isAuthenticated()"><a class="nav-link" th:href="@{/login}">Login</a></span>
                <span sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="btn btn-link nav-link p-0 border-0 bg-transparent text-white-50">Logout</button>
                    </form>
                </span>
            </div>
        </div>
    </div>
</nav>

<div style="height: 100px;"></div>

<div class="container pb-5">
    <div class="d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3 mb-4">
        <div class="d-flex align-items-center gap-3">
            <a href="/containers" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i> Voltar
            </a>
            <h4 class="text-white fw-bold m-0">Logs do Container</h4>
        </div>
        <div class="d-flex align-items-center gap-2 flex-wrap">
            <span id="containerBadge" class="badge bg-info bg-opacity-10 text-info border border-info border-opacity-25 px-3 py-2 font-monospace">
                —
            </span>
            <button type="button" id="refreshLogsBtn" class="btn btn-outline-primary btn-sm">
                <i class="bi bi-arrow-clockwise me-1"></i> Atualizar
            </button>
            <div class="form-check form-switch mb-0">
                <input class="form-check-input" type="checkbox" id="autoRefreshToggle">
                <label class="form-check-label text-white-50 small" for="autoRefreshToggle">Auto-refresh (3s)</label>
            </div>
        </div>
    </div>

    <div id="logsError" class="alert alert-danger d-none" role="alert"></div>

    <div class="card card-metric">
        <div class="card-body p-0">
            <pre id="logsOutput" class="text-white-50 small mb-0 p-4 font-monospace" style="max-height: 70vh; overflow-y: auto; white-space: pre-wrap; word-break: break-word;">Carregando logs...</pre>
        </div>
    </div>
</div>

<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{home/js/logs.js}"></script>

</body>
</html>
